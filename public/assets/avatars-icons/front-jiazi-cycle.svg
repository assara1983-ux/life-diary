<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 590 340" width="100%" height="100%">
  <defs>
    <style>
      @keyframes flow-1 { 0% { stroke-dashoffset: 0; } 100% { stroke-dashoffset: -38; } }
      @keyframes flow-2 { 0% { stroke-dashoffset: 0; } 100% { stroke-dashoffset: 38; } }
      @keyframes pulse-dot { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.15); opacity: 1; filter: drop-shadow(0 0 4px currentColor); } }
      .grid { stroke: rgba(0,112,192,.06); stroke-width: .8; }
      .axis { stroke: rgba(0,112,192,.15); stroke-width: 1.5; stroke-dasharray: 5 5; }
      .base-line { fill: none; stroke-width: 3.5; stroke-linecap: round; stroke-linejoin: round; }
      .flow-line { fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-dasharray: 9 15; }
      .f-health  { animation: flow-1 4.5s linear infinite; }
      .f-career  { animation: flow-2 5.5s linear infinite; }
      .f-relat   { animation: flow-1 5s linear infinite; }
      .f-spirit  { animation: flow-2 6s linear independent; }
      .f-finance { animation: flow-1 3.5s linear infinite; }
      .dot { transform-origin: center; transform-box: fill-box; animation: pulse-dot 2.8s ease-in-out infinite; }
      .conn { stroke: rgba(0,112,192,.2); stroke-width: 1.5; stroke-dasharray: 2 2; }
      .label { font-family: monospace; font-size: 11px; fill: #5c4a30; letter-spacing: .8px; }
      .phase { font-family: monospace; font-size: 9px; fill: #8c7a5a; font-weight: 700; }
      .title { font-family: monospace; font-size: 11px; fill: #5c4a30; letter-spacing: 1.2px; }
      .health    { stroke: #2d6a4f; color: #2d6a4f; }
      .career    { stroke: #0070c0; color: #0070c0; }
      .relations { stroke: #c8a45a; color: #c8a45a; }
      .spirit    { stroke: #5c4a30; color: #5c4a30; }
      .finance   { stroke: #8c7a5a; color: #8c7a5a; }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="#f5f0e1"/>
  <g transform="translate(210, 120) scale(1.4) translate(-210, -120)">
    <g class="grid">
      <line x1="0" y1="60" x2="420" y2="60"/><line x1="0" y1="110" x2="420" y2="110"/><line x1="0" y1="160" x2="420" y2="160"/>
      <line x1="100" y1="0" x2="100" y2="240"/><line x1="210" y1="0" x2="210" y2="240"/><line x1="320" y1="0" x2="320" y2="240"/>
    </g>
    <line x1="40" y1="110" x2="380" y2="110" class="axis"/>

    <!-- 1. Здоровье -->
    <path class="base-line health" d="M 50 105 C 110 45 150 145 210 105 C 270 65 310 145 370 105">
      <animate attributeName="d" values="M 50 105 C 110 45 150 145 210 105 C 270 65 310 145 370 105; M 50 105 C 110 55 150 155 210 105 C 270 75 310 155 370 105; M 50 105 C 110 45 150 145 210 105 C 270 65 310 145 370 105" dur="8.5s" repeatCount="indefinite" calcMode="spline" keyTimes="0; 0.5; 1" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" />
    </path>
    <path class="flow-line f-health health" d="M 50 105 C 110 45 150 145 210 105 C 270 65 310 145 370 105">
      <animate attributeName="d" values="M 50 105 C 110 45 150 145 210 105 C 270 65 310 145 370 105; M 50 105 C 110 55 150 155 210 105 C 270 75 310 155 370 105; M 50 105 C 110 45 150 145 210 105 C 270 65 310 145 370 105" dur="8.5s" repeatCount="indefinite" calcMode="spline" keyTimes="0; 0.5; 1" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" />
    </path>

    <!-- 2. Карьера -->
    <path class="base-line career" d="M 50 115 C 110 165 150 85 210 115 C 270 165 310 85 370 115">
      <animate attributeName="d" values="M 50 115 C 110 165 150 85 210 115 C 270 165 310 85 370 115; M 50 115 C 110 175 150 95 210 115 C 270 175 310 95 370 115; M 50 115 C 110 165 150 85 210 115 C 270 165 310 85 370 115" dur="11s" repeatCount="indefinite" calcMode="spline" keyTimes="0; 0.5; 1" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" />
    </path>
    <path class="flow-line f-career career" d="M 50 115 C 110 165 150 85 210 115 C 270 165 310 85 370 115">
      <animate attributeName="d" values="M 50 115 C 110 165 150 85 210 115 C 270 165 310 85 370 115; M 50 115 C 110 175 150 95 210 115 C 270 175 310 95 370 115; M 50 115 C 110 165 150 85 210 115 C 270 165 310 85 370 115" dur="11s" repeatCount="indefinite" calcMode="spline" keyTimes="0; 0.5; 1" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" />
    </path>

    <!-- 3. Отношения -->
    <path class="base-line relations" d="M 50 95 C 110 35 150 135 210 95 C 270 55 310 135 370 95">
      <animate attributeName="d" values="M 50 95 C 110 35 150 135 210 95 C 270 55 310 135 370 95; M 50 95 C 110 45 150 145 210 95 C 270 65 310 145 370 95; M 50 95 C 110 35 150 135 210 95 C 270 55 310 135 370 95" dur="10s" repeatCount="indefinite" calcMode="spline" keyTimes="0; 0.5; 1" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" />
    </path>
    <path class="flow-line f-relat relations" d="M 50 95 C 110 35 150 135 210 95 C 270 55 310 135 370 95">
      <animate attributeName="d" values="M 50 95 C 110 35 150 135 210 95 C 270 55 310 135 370 95; M 50 95 C 110 45 150 145 210 95 C 270 65 310 145 370 95; M 50 95 C 110 35 150 135 210 95 C 270 55 310 135 370 95" dur="10s" repeatCount="indefinite" calcMode="spline" keyTimes="0; 0.5; 1" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" />
    </path>

    <!-- 4. Духовность -->
    <path class="base-line spirit" d="M 50 125 C 110 185 150 105 210 125 C 270 185 310 105 370 125">
      <animate attributeName="d" values="M 50 125 C 110 185 150 105 210 125 C 270 185 310 105 370 125; M 50 125 C 110 175 150 95 210 125 C 270 175 310 95 370 125; M 50 125 C 110 185 150 105 210 125 C 270 185 310 105 370 125" dur="12.5s" repeatCount="indefinite" calcMode="spline" keyTimes="0; 0.5; 1" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" />
    </path>
    <path class="flow-line f-spirit spirit" d="M 50 125 C 110 185 150 105 210 125 C 270 185 310 105 370 125">
      <animate attributeName="d" values="M 50 125 C 110 185 150 105 210 125 C 270 185 310 105 370 125; M 50 125 C 110 175 150 95 210 125 C 270 175 310 95 370 125; M 50 125 C 110 185 150 105 210 125 C 270 185 310 105 370 125" dur="12.5s" repeatCount="indefinite" calcMode="spline" keyTimes="0; 0.5; 1" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" />
    </path>

    <!-- 5. Финансы -->
    <path class="base-line finance" d="M 50 85 C 110 25 150 125 210 85 C 270 45 310 125 370 85">
      <animate attributeName="d" values="M 50 85 C 110 25 150 125 210 85 C 270 45 310 125 370 85; M 50 85 C 110 35 150 135 210 85 C 270 55 310 135 370 85; M 50 85 C 110 25 150 125 210 85 C 270 45 310 125 370 85" dur="7s" repeatCount="indefinite" calcMode="spline" keyTimes="0; 0.5; 1" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" />
    </path>
    <path class="flow-line f-finance finance" d="M 50 85 C 110 25 150 125 210 85 C 270 45 310 125 370 85">
      <animate attributeName="d" values="M 50 85 C 110 25 150 125 210 85 C 270 45 310 125 370 85; M 50 85 C 110 35 150 135 210 85 C 270 55 310 135 370 85; M 50 85 C 110 25 150 125 210 85 C 270 45 310 125 370 85" dur="7s" repeatCount="indefinite" calcMode="spline" keyTimes="0; 0.5; 1" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" />
    </path>

    <g>
      <line x1="100" y1="85" x2="100" y2="65" class="conn"/><circle cx="100" cy="85" r="5" fill="#f5f0e1" stroke="#8c7a5a" stroke-width="2" class="dot"/><text x="100" y="60" class="phase" text-anchor="middle">20–25</text>
      <line x1="150" y1="145" x2="150" y2="165" class="conn"/><circle cx="150" cy="145" r="5" fill="#f5f0e1" stroke="#2d6a4f" stroke-width="2" class="dot" style="animation-delay: 0.5s"/><text x="150" y="178" class="phase" text-anchor="middle">25–30</text>
      <line x1="210" y1="85" x2="210" y2="65" class="conn"/><circle cx="210" cy="85" r="5" fill="#f5f0e1" stroke="#0070c0" stroke-width="2" class="dot" style="animation-delay: 1s"/><text x="210" y="60" class="phase" text-anchor="middle">35–40</text>
      <line x1="270" y1="55" x2="270" y2="35" class="conn"/><circle cx="270" cy="55" r="5" fill="#f5f0e1" stroke="#c8a45a" stroke-width="2" class="dot" style="animation-delay: 1.5s"/><text x="270" y="30" class="phase" text-anchor="middle">45–50</text>
      <line x1="310" y1="185" x2="310" y2="205" class="conn"/><circle cx="310" cy="185" r="5" fill="#f5f0e1" stroke="#5c4a30" stroke-width="2" class="dot" style="animation-delay: 2s"/><text x="310" y="218" class="phase" text-anchor="middle">55–60</text>
    </g>

    <text x="32" y="107" class="label" text-anchor="end">ЗДОРОВЬЕ</text>
    <text x="32" y="117" class="label" text-anchor="end">КАРЬЕРА</text>
    <text x="32" y="97" class="label" text-anchor="end">ОТНОШЕНИЯ</text>
    <text x="32" y="127" class="label" text-anchor="end">ДУХОВНОСТЬ</text>
    <text x="32" y="87" class="label" text-anchor="end">ФИНАНСЫ</text>
    <text x="378" y="107" class="label" text-anchor="start">ЗДОРОВЬЕ</text>
    <text x="378" y="117" class="label" text-anchor="start">КАРЬЕРА</text>
    <text x="378" y="97" class="label" text-anchor="start">ОТНОШЕНИЯ</text>
    <text x="378" y="127" class="label" text-anchor="start">ДУХОВНОСТЬ</text>
    <text x="378" y="87" class="label" text-anchor="start">ФИНАНСЫ</text>
    <text x="210" y="232" class="title" text-anchor="middle">ЦЯЦЗЫ: ГОРИЗОНТАЛЬНЫЙ ЦИКЛ • КЛЮЧЕВЫЕ ПЕРИОДЫ</text>
  </g>
</svg>
