<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 240" width="100%" height="100%">
  <defs>
    <style>
      /* Анимация потока энергии (движение пунктира) */
      @keyframes flow-1 { 0% { stroke-dashoffset: 0; } 100% { stroke-dashoffset: -24; } }
      @keyframes flow-2 { 0% { stroke-dashoffset: 0; } 100% { stroke-dashoffset: 24; } }
      
      /* Пульсация ключевых точек */
      @keyframes pulse-dot {
        0%, 100% { transform: scale(1); opacity: 0.8; }
        50% { transform: scale(1.2); opacity: 1; filter: drop-shadow(0 0 4px currentColor); }
      }

      .grid { stroke: rgba(0,112,192,.06); stroke-width: .5; }
      .axis { stroke: rgba(0,112,192,.15); stroke-width: 1; stroke-dasharray: 4 4; }
      
      /* Базовые стили линий */
      .base-line { fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
      .flow-line { fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-dasharray: 6 10; }
      
      /* Скорости потока */
      .f-health  { animation: flow-1 2.5s linear infinite; }
      .f-career  { animation: flow-2 3.2s linear infinite; }
      .f-relat   { animation: flow-1 2.8s linear infinite; }
      .f-spirit  { animation: flow-2 3.5s linear independent; }
      .f-finance { animation: flow-1 2.0s linear infinite; }

      /* Точки и тексты */
      .dot { transform-origin: center; transform-box: fill-box; animation: pulse-dot 2s ease-in-out infinite; }
      .conn { stroke: rgba(0,112,192,.2); stroke-width: 1; stroke-dasharray: 2 2; }
      .label { font-family: monospace; font-size: 8px; fill: #5c4a30; letter-spacing: .5px; }
      .phase { font-family: monospace; font-size: 7.5px; fill: #8c7a5a; font-weight: 700; }
      .title { font-family: monospace; font-size: 9px; fill: #5c4a30; letter-spacing: 1.2px; }

      /* Цвета сфер */
      .health    { stroke: #2d6a4f; color: #2d6a4f; }
      .career    { stroke: #0070c0; color: #0070c0; }
      .relations { stroke: #c8a45a; color: #c8a45a; }
      .spirit    { stroke: #5c4a30; color: #5c4a30; }
      .finance   { stroke: #8c7a5a; color: #8c7a5a; }
    </style>
  </defs>

  <!-- Фон и статичная сетка -->
  <rect width="100%" height="100%" fill="#f5f0e1"/>
  <g class="grid">
    <line x1="0" y1="60" x2="420" y2="60"/><line x1="0" y1="110" x2="420" y2="110"/><line x1="0" y1="160" x2="420" y2="160"/>
    <line x1="100" y1="0" x2="100" y2="240"/><line x1="210" y1="0" x2="210" y2="240"/><line x1="320" y1="0" x2="320" y2="240"/>
  </g>
  <!-- Горизонтальная ось -->
  <line x1="40" y1="110" x2="380" y2="110" class="axis"/>

  <!-- ГРУППА АНИМИРОВАННЫХ ГРАФИКОВ (Движутся самостоятельно) -->
  
  <!-- 1. Здоровье (Зеленый) - Частота 6с -->
  <path class="base-line health" d="M 50 105 C 110 45 150 145 210 105 C 270 65 310 145 370 105">
    <animate attributeName="d" 
             values="M 50 105 C 110 45 150 145 210 105 C 270 65 310 145 370 105;
                     M 50 105 C 110 55 150 155 210 105 C 270 75 310 155 370 105;
                     M 50 105 C 110 45 150 145 210 105 C 270 65 310 145 370 105" 
             dur="6s" repeatCount="indefinite" calcMode="spline" keyTimes="0; 0.5; 1" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" />
  </path>
  <path class="flow-line f-health health" d="M 50 105 C 110 45 150 145 210 105 C 270 65 310 145 370 105">
    <animate attributeName="d" 
             values="M 50 105 C 110 45 150 145 210 105 C 270 65 310 145 370 105;
                     M 50 105 C 110 55 150 155 210 105 C 270 75 310 155 370 105;
                     M 50 105 C 110 45 150 145 210 105 C 270 65 310 145 370 105" 
             dur="6s" repeatCount="indefinite" calcMode="spline" keyTimes="0; 0.5; 1" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" />
  </path>

  <!-- 2. Карьера (Синий) - Частота 8с -->
  <path class="base-line career" d="M 50 115 C 110 165 150 85 210 115 C 270 165 310 85 370 115">
    <animate attributeName="d" 
             values="M 50 115 C 110 165 150 85 210 115 C 270 165 310 85 370 115;
                     M 50 115 C 110 175 150 95 210 115 C 270 175 310 95 370 115;
                     M 50 115 C 110 165 150 85 210 115 C 270 165 310 85 370 115" 
             dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0; 0.5; 1" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" />
  </path>
  <path class="flow-line f-career career" d="M 50 115 C 110 165 150 85 210 115 C 270 165 310 85 370 115">
    <animate attributeName="d" 
             values="M 50 115 C 110 165 150 85 210 115 C 270 165 310 85 370 115;
                     M 50 115 C 110 175 150 95 210 115 C 270 175 310 95 370 115;
                     M 50 115 C 110 165 150 85 210 115 C 270 165 310 85 370 115" 
             dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0; 0.5; 1" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" />
  </path>

  <!-- 3. Отношения (Золотой) - Частота 7с -->
  <path class="base-line relations" d="M 50 95 C 110 35 150 135 210 95 C 270 55 310 135 370 95">
    <animate attributeName="d" 
             values="M 50 95 C 110 35 150 135 210 95 C 270 55 310 135 370 95;
                     M 50 95 C 110 45 150 145 210 95 C 270 65 310 145 370 95;
                     M 50 95 C 110 35 150 135 210 95 C 270 55 310 135 370 95" 
             dur="7s" repeatCount="indefinite" calcMode="spline" keyTimes="0; 0.5; 1" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" />
  </path>
  <path class="flow-line f-relat relations" d="M 50 95 C 110 35 150 135 210 95 C 270 55 310 135 370 95">
    <animate attributeName="d" 
             values="M 50 95 C 110 35 150 135 210 95 C 270 55 310 135 370 95;
                     M 50 95 C 110 45 150 145 210 95 C 270 65 310 145 370 95;
                     M 50 95 C 110 35 150 135 210 95 C 270 55 310 135 370 95"              dur="7s" repeatCount="indefinite" calcMode="spline" keyTimes="0; 0.5; 1" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" />
  </path>

  <!-- 4. Духовность (Коричневый) - Частота 9с -->
  <path class="base-line spirit" d="M 50 125 C 110 185 150 105 210 125 C 270 185 310 105 370 125">
    <animate attributeName="d" 
             values="M 50 125 C 110 185 150 105 210 125 C 270 185 310 105 370 125;
                     M 50 125 C 110 175 150 95 210 125 C 270 175 310 95 370 125;
                     M 50 125 C 110 185 150 105 210 125 C 270 185 310 105 370 125" 
             dur="9s" repeatCount="indefinite" calcMode="spline" keyTimes="0; 0.5; 1" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" />
  </path>
  <path class="flow-line f-spirit spirit" d="M 50 125 C 110 185 150 105 210 125 C 270 185 310 105 370 125">
    <animate attributeName="d" 
             values="M 50 125 C 110 185 150 105 210 125 C 270 185 310 105 370 125;
                     M 50 125 C 110 175 150 95 210 125 C 270 175 310 95 370 125;
                     M 50 125 C 110 185 150 105 210 125 C 270 185 310 105 370 125" 
             dur="9s" repeatCount="indefinite" calcMode="spline" keyTimes="0; 0.5; 1" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" />
  </path>

  <!-- 5. Финансы (Серый) - Частота 5с -->
  <path class="base-line finance" d="M 50 85 C 110 25 150 125 210 85 C 270 45 310 125 370 85">
    <animate attributeName="d" 
             values="M 50 85 C 110 25 150 125 210 85 C 270 45 310 125 370 85;
                     M 50 85 C 110 35 150 135 210 85 C 270 55 310 135 370 85;
                     M 50 85 C 110 25 150 125 210 85 C 270 45 310 125 370 85" 
             dur="5s" repeatCount="indefinite" calcMode="spline" keyTimes="0; 0.5; 1" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" />
  </path>
  <path class="flow-line f-finance finance" d="M 50 85 C 110 25 150 125 210 85 C 270 45 310 125 370 85">
    <animate attributeName="d" 
             values="M 50 85 C 110 25 150 125 210 85 C 270 45 310 125 370 85;
                     M 50 85 C 110 35 150 135 210 85 C 270 55 310 135 370 85;
                     M 50 85 C 110 25 150 125 210 85 C 270 45 310 125 370 85" 
             dur="5s" repeatCount="indefinite" calcMode="spline" keyTimes="0; 0.5; 1" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" />
  </path>

  <!-- Ключевые точки событий (Пульсируют) -->
  <g>
    <!-- Финансы -->
    <line x1="100" y1="85" x2="100" y2="65" class="conn"/>
    <circle cx="100" cy="85" r="4.5" fill="#f5f0e1" stroke="#8c7a5a" stroke-width="1.5" class="dot"/>
    <text x="100" y="60" class="phase" text-anchor="middle">20–25</text>

    <!-- Здоровье -->
    <line x1="150" y1="145" x2="150" y2="165" class="conn"/>
    <circle cx="150" cy="145" r="4.5" fill="#f5f0e1" stroke="#2d6a4f" stroke-width="1.5" class="dot" style="animation-delay: 0.5s"/>
    <text x="150" y="178" class="phase" text-anchor="middle">25–30</text>

    <!-- Карьера -->
    <line x1="210" y1="85" x2="210" y2="65" class="conn"/>
    <circle cx="210" cy="85" r="4.5" fill="#f5f0e1" stroke="#0070c0" stroke-width="1.5" class="dot" style="animation-delay: 1s"/>    <text x="210" y="60" class="phase" text-anchor="middle">35–40</text>

    <!-- Отношения -->
    <line x1="270" y1="55" x2="270" y2="35" class="conn"/>
    <circle cx="270" cy="55" r="4.5" fill="#f5f0e1" stroke="#c8a45a" stroke-width="1.5" class="dot" style="animation-delay: 1.5s"/>
    <text x="270" y="30" class="phase" text-anchor="middle">45–50</text>

    <!-- Духовность -->
    <line x1="310" y1="185" x2="310" y2="205" class="conn"/>
    <circle cx="310" cy="185" r="4.5" fill="#f5f0e1" stroke="#5c4a30" stroke-width="1.5" class="dot" style="animation-delay: 2s"/>
    <text x="310" y="218" class="phase" text-anchor="middle">55–60</text>
  </g>

  <!-- Статичные подписи сфер -->
  <text x="32" y="107" class="label" text-anchor="end">ЗДОРОВЬЕ</text>
  <text x="32" y="117" class="label" text-anchor="end">КАРЬЕРА</text>
  <text x="32" y="97" class="label" text-anchor="end">ОТНОШЕНИЯ</text>
  <text x="32" y="127" class="label" text-anchor="end">ДУХОВНОСТЬ</text>
  <text x="32" y="87" class="label" text-anchor="end">ФИНАНСЫ</text>

  <!-- Заголовок -->
  <text x="210" y="232" class="title" text-anchor="middle">ЦЯЦЗЫ: ГОРИЗОНТАЛЬНЫЙ ЦИКЛ • КЛЮЧЕВЫЕ ПЕРИОДЫ</text>
</svg>
