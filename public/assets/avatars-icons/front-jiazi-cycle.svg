<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="100%" height="100%">
  <defs>
    <style>
      @keyframes pulse { 0%,100%{opacity:0.6;transform:scale(1)} 50%{opacity:1;transform:scale(1.15)} }
      @keyframes flow { 0%{stroke-dashoffset:0} 100%{stroke-dashoffset:-200} }
      .grid { stroke:rgba(0,112,192,0.06); stroke-width:0.5; }
      .wave { fill:none; stroke:var(--blue, #0070c0); stroke-width:2; stroke-linecap:round; }
      .node { fill:var(--gold, #c8a45a); }
      .marker { fill:var(--blue, #0070c0); }
      .flow-path { stroke:var(--gold, #c8a45a); stroke-width:1.5; stroke-dasharray:8 6; animation:flow 4s linear infinite; }
    </style>
  </defs>
  
  <!-- Сетка -->
  <g class="grid">
    <line x1="0" y1="40" x2="400" y2="40"/>
    <line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="80" y1="0" x2="80" y2="200"/>
    <line x1="160" y1="0" x2="160" y2="200"/>
    <line x1="240" y1="0" x2="240" y2="200"/>
    <line x1="320" y1="0" x2="320" y2="200"/>
  </g>

  <!-- Волна жизненного цикла -->
  <path class="wave" d="M 20 100 Q 60 40 100 100 T 180 100 T 260 100 T 340 100 T 400 100"/>
  <path class="flow-path" d="M 20 100 Q 60 40 100 100 T 180 100 T 260 100 T 340 100 T 400 100"/>

  <!-- Узлы стадий -->
  <circle cx="20" cy="100" r="3" class="node"/>
  <circle cx="60" cy="60" r="3" class="node"/>
  <circle cx="100" cy="100" r="3" class="node"/>
  <circle cx="140" cy="140" r="3" class="node"/>
  <circle cx="180" cy="100" r="3" class="node"/>
  <circle cx="220" cy="60" r="3" class="node"/>
  <circle cx="260" cy="100" r="3" class="node"/>
  <circle cx="300" cy="140" r="3" class="node"/>
  <circle cx="340" cy="100" r="3" class="node"/>
  <circle cx="380" cy="60" r="3" class="node"/>

  <!-- Текущая позиция (пульсирует) -->
  <circle cx="180" cy="100" r="5" class="marker" style="animation:pulse 2s ease-in-out infinite"/>
  <circle cx="180" cy="100" r="12" fill="none" stroke="var(--blue, #0070c0)" stroke-width="1" stroke-dasharray="3 2" style="animation:pulse 2s ease-in-out infinite"/>

  <!-- Подписи -->
  <text x="180" y="185" text-anchor="middle" font-family="monospace" font-size="9" fill="var(--text2, #5c4a30)" letter-spacing="1">ЦЯЦЗЫ: ЦИКЛ 12 СТАДИЙ</text>
</svg>