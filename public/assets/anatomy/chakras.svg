<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 800" width="100%" height="100%">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <path d="M 200 80 L 200 680" stroke="#c8a45a" stroke-width="1" stroke-dasharray="4,3" fill="none" opacity="0.5"/>
  <g class="chakra-layer">
    <g data-chakra="sahasrara"><circle cx="200" cy="80" r="10" fill="#8e44ad" opacity="0.4" filter="url(#glow)"/><circle cx="200" cy="80" r="3" fill="#c8a45a"/></g>
    <g data-chakra="ajna"><circle cx="200" cy="140" r="9" fill="#9b59b6" opacity="0.4" filter="url(#glow)"/><circle cx="200" cy="140" r="3" fill="#c8a45a"/></g>
    <g data-chakra="vishuddha"><circle cx="200" cy="220" r="10" fill="#3498db" opacity="0.4" filter="url(#glow)"/><circle cx="200" cy="220" r="3" fill="#c8a45a"/></g>
    <g data-chakra="anahata"><circle cx="200" cy="280" r="11" fill="#2ecc71" opacity="0.4" filter="url(#glow)"/><circle cx="200" cy="280" r="3" fill="#c8a45a"/></g>
    <g data-chakra="manipura"><circle cx="200" cy="360" r="10" fill="#f1c40f" opacity="0.4" filter="url(#glow)"/><circle cx="200" cy="360" r="3" fill="#c8a45a"/></g>
    <g data-chakra="svadhisthana"><circle cx="200" cy="460" r="9" fill="#e67e22" opacity="0.4" filter="url(#glow)"/><circle cx="200" cy="460" r="3" fill="#c8a45a"/></g>
    <g data-chakra="muladhara"><circle cx="200" cy="560" r="10" fill="#e74c3c" opacity="0.4" filter="url(#glow)"/><circle cx="200" cy="560" r="3" fill="#c8a45a"/></g>
  </g>
</svg>
