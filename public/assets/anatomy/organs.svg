<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 800" width="100%" height="100%">
  <style>
    .organ-path {
      fill: rgba(0, 112, 192, 0.15);
      stroke: #0070c0;
      stroke-width: 1.5;
      transition: all 0.2s;
    }
    .organ-path:hover {
      fill: rgba(0, 112, 192, 0.35);
      stroke-width: 2;
    }
  </style>
  
  <!-- Координаты пересчитаны под пропорции Витрувианского человека (400x800) -->
  
  <!-- Голова (Мозг) -->
  <path class="organ-path" data-organ="brain" d="M175,100 Q200,70 225,100 Q200,130 175,100" />

  <!-- Легкие (Грудная клетка) -->
  <path class="organ-path" data-organ="lungs" d="M160,260 Q140,230 160,200 Q180,230 195,250 Q180,280 160,260 Z M240,260 Q260,230 240,200 Q220,230 205,250 Q220,280 240,260 Z" />

  <!-- Сердце (Лево от центра - правая часть фигуры на рисунке) -->
  <path class="organ-path" data-organ="heart" d="M210,280 Q200,270 210,260 Q220,270 210,280 Q200,290 210,280 Z" />

  <!-- Печень (Право от центра - левая часть фигуры на рисунке) -->
  <path class="organ-path" data-organ="liver" d="M170,340 Q190,330 200,350 Q190,370 170,340 Z" />

  <!-- Желудок (Левее печени, ниже) -->
  <path class="organ-path" data-organ="stomach" d="M200,360 Q190,380 200,390 Q210,380 200,360 Z" />

  <!-- Селезенка (Далеко слева) -->
  <path class="organ-path" data-organ="spleen" d="M225,360 Q215,350 225,340 Q235,350 225,360 Z" />

  <!-- Почки (Поясница, по бокам) -->
  <path class="organ-path" data-organ="kidneys" d="M190,420 Q180,400 190,400 Q200,400 190,420 Z M210,420 Q200,400 210,400 Q220,400 210,420 Z" />

  <!-- Кишечник (Тазовая полость) -->
  <path class="organ-path" data-organ="intestines" d="M175,480 Q165,520 175,560 Q200,580 225,560 Q235,520 225,480 Z" />

  <!-- Мочевой пузырь (Ниже) -->
  <path class="organ-path" data-organ="bladder" d="M185,600 Q185,585 200,585 Q215,585 215,600 Q215,615 200,615 Q185,615 185,600 Z" />
</svg>
