<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="60" height="60" viewBox="0 0 60 60">
  <!-- outer ring -->
  <circle cx="30" cy="30" r="19" fill="none"
    stroke="#4f46e5" stroke-width="0.7" opacity="0.6"/>
  <!-- petals -->
  <ellipse cx="44.0" cy="30.0" rx="2.8" ry="1.5" transform="rotate(0 44.0 30.0)" fill="#4f46e5" opacity="0.82"/><ellipse cx="39.9" cy="39.9" rx="2.8" ry="1.5" transform="rotate(45 39.9 39.9)" fill="#4f46e5" opacity="0.82"/><ellipse cx="30.0" cy="44.0" rx="2.8" ry="1.5" transform="rotate(90 30.0 44.0)" fill="#4f46e5" opacity="0.82"/><ellipse cx="20.1" cy="39.9" rx="2.8" ry="1.5" transform="rotate(135 20.1 39.9)" fill="#4f46e5" opacity="0.82"/><ellipse cx="16.0" cy="30.0" rx="2.8" ry="1.5" transform="rotate(180 16.0 30.0)" fill="#4f46e5" opacity="0.82"/><ellipse cx="20.1" cy="20.1" rx="2.8" ry="1.5" transform="rotate(225 20.1 20.1)" fill="#4f46e5" opacity="0.82"/><ellipse cx="30.0" cy="16.0" rx="2.8" ry="1.5" transform="rotate(270 30.0 16.0)" fill="#4f46e5" opacity="0.82"/><ellipse cx="39.9" cy="20.1" rx="2.8" ry="1.5" transform="rotate(315 39.9 20.1)" fill="#4f46e5" opacity="0.82"/>
  <!-- main circle -->
  <circle cx="30" cy="30" r="10"
    fill="#4f46e5bb" stroke="#4f46e5" stroke-width="2"
    filter="url(#glow)"/>
  <!-- white dot -->
  <circle cx="30" cy="30" r="2.2" fill="white" opacity="0.85"/>
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
</svg>